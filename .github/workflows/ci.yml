name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new push comes in for the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint · Type-check · Build · Test · Bench
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type-check
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Test
        run: npm test

      - name: Perf benchmark (fetch + XHR overhead, PRD §13.1)
        # Hard gate: p95 patch overhead > 0.5ms exits non-zero and
        # fails the job. Both fetch and XHR benches must pass.
        run: npm run bench

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: hindsight-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

      - name: Package CWS-ready ZIP
        # Chrome Web Store expects a .zip of the extension contents
        # (not a folder containing dist/). Produced as a separate
        # artifact so the user can grab a ready-to-upload archive
        # from any CI run.
        run: |
          VERSION=$(node -p "require('./package.json').version")
          (cd dist && zip -r "../hindsight-${VERSION}-${GITHUB_SHA::7}.zip" .)

      - name: Upload CWS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: hindsight-cws-zip-${{ github.sha }}
          path: hindsight-*.zip
          if-no-files-found: error
          retention-days: 30
