<?xml version="1.0" encoding="UTF-8"?>
<!--
  Marquee promo tile for the Chrome Web Store (1400×560).

  Open in a browser to preview. For the CWS upload, either:
    1. Open in Chrome, take a screenshot at 100% zoom, crop to 1400×560.
    2. Import into Figma / Inkscape / Affinity Designer and export as PNG.
    3. Use `rsvg-convert -w 1400 -h 560 promo-1400x560.svg promo-1400x560.png`
       (Homebrew: `brew install librsvg`).

  This is a designer-ready starting point — fonts, colours and layout
  match the rest of the brand surface (popup / sidepanel / landing
  page). Replace the mock timeline with a real screenshot when you
  have one.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1400"
  height="560"
  viewBox="0 0 1400 560"
  font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0e1a" />
      <stop offset="1" stop-color="#161b34" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f5b042" />
      <stop offset="1" stop-color="#e08c1a" />
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1400" height="560" fill="url(#bg)" />

  <!-- subtle grid texture -->
  <g opacity="0.08" stroke="#8590b8" stroke-width="1">
    <line x1="0" y1="140" x2="1400" y2="140" />
    <line x1="0" y1="280" x2="1400" y2="280" />
    <line x1="0" y1="420" x2="1400" y2="420" />
  </g>

  <!-- left column — copy -->
  <g transform="translate(80, 110)">
    <!-- brand mark -->
    <circle cx="14" cy="14" r="10" fill="#f5b042" />
    <text x="40" y="22" fill="#e6e8f5" font-size="22" font-weight="600">Hindsight</text>

    <!-- headline -->
    <text x="0" y="100" fill="#e6e8f5" font-size="64" font-weight="700" letter-spacing="-1.5">
      <tspan>DevTools you</tspan>
    </text>
    <text x="0" y="170" fill="#e6e8f5" font-size="64" font-weight="700" letter-spacing="-1.5">
      <tspan>didn't open.</tspan>
    </text>

    <!-- tagline -->
    <text x="0" y="230" fill="#8590b8" font-size="22" font-weight="400">
      <tspan>Privacy-first passive capture for bug reports.</tspan>
    </text>
    <text x="0" y="260" fill="#8590b8" font-size="22" font-weight="400">
      <tspan>Scrub back through time. Ship the whole session in one</tspan>
    </text>
    <text x="0" y="290" fill="#8590b8" font-size="22" font-weight="400">
      <tspan>self-contained HTML file. No backend. No telemetry.</tspan>
    </text>

    <!-- promise chips -->
    <g transform="translate(0, 340)">
      <g transform="translate(0,0)">
        <rect width="220" height="36" rx="18" fill="none" stroke="#232a4d" stroke-width="1.5" />
        <text x="20" y="23" fill="#5fdc8a" font-size="13" font-weight="600">✓ No info loss</text>
      </g>
      <g transform="translate(240,0)">
        <rect width="240" height="36" rx="18" fill="none" stroke="#232a4d" stroke-width="1.5" />
        <text x="20" y="23" fill="#5fdc8a" font-size="13" font-weight="600">✓ Never leaves your machine</text>
      </g>
      <g transform="translate(500,0)">
        <rect width="190" height="36" rx="18" fill="none" stroke="#232a4d" stroke-width="1.5" />
        <text x="20" y="23" fill="#5fdc8a" font-size="13" font-weight="600">✓ Zero setup</text>
      </g>
    </g>
  </g>

  <!-- right column — mock sidepanel -->
  <g transform="translate(820, 90)">
    <!-- frame -->
    <rect width="500" height="380" rx="12" fill="#11152a" stroke="#232a4d" stroke-width="1.5" />

    <!-- topbar -->
    <rect x="0" y="0" width="500" height="44" rx="12" fill="#0b0e1a" />
    <rect x="0" y="32" width="500" height="12" fill="#0b0e1a" />
    <circle cx="20" cy="22" r="6" fill="#f5b042" />
    <text x="35" y="27" fill="#e6e8f5" font-size="14" font-weight="600">Hindsight</text>
    <text x="450" y="27" fill="#8590b8" font-size="11" font-family="ui-monospace, monospace">11:25:59</text>

    <!-- filter chips -->
    <g transform="translate(18, 60)">
      <rect width="62" height="22" rx="11" fill="#f5b042" />
      <text x="14" y="15" fill="#1a1303" font-size="11" font-weight="600">Failed</text>
      <rect x="70" width="42" height="22" rx="11" fill="none" stroke="#232a4d" />
      <text x="82" y="15" fill="#8590b8" font-size="11">API</text>
      <rect x="120" width="42" height="22" rx="11" fill="none" stroke="#232a4d" />
      <text x="134" y="15" fill="#8590b8" font-size="11">All</text>
    </g>

    <!-- scrubber histogram -->
    <g transform="translate(18, 102)">
      <rect x="0" y="0" width="464" height="50" fill="#0b0e1a" rx="4" />
      <!-- bars -->
      <g fill="#f5b042" opacity="0.7">
        <rect x="14" y="34" width="8" height="14" />
        <rect x="28" y="22" width="8" height="26" />
        <rect x="42" y="38" width="8" height="10" />
        <rect x="56" y="14" width="8" height="34" />
        <rect x="70" y="28" width="8" height="20" />
        <rect x="84" y="40" width="8" height="8" />
        <rect x="98" y="20" width="8" height="28" />
        <rect x="112" y="10" width="8" height="38" />
        <rect x="126" y="30" width="8" height="18" />
        <rect x="140" y="36" width="8" height="12" />
        <rect x="154" y="8" width="8" height="40" />
        <rect x="168" y="24" width="8" height="24" />
        <rect x="182" y="32" width="8" height="16" />
        <rect x="196" y="18" width="8" height="30" />
        <rect x="210" y="38" width="8" height="10" />
        <rect x="224" y="26" width="8" height="22" />
        <rect x="238" y="14" width="8" height="34" />
        <rect x="252" y="34" width="8" height="14" />
        <rect x="266" y="22" width="8" height="26" />
        <rect x="280" y="38" width="8" height="10" />
        <rect x="294" y="16" width="8" height="32" />
        <rect x="308" y="28" width="8" height="20" />
        <rect x="322" y="34" width="8" height="14" />
        <rect x="336" y="20" width="8" height="28" />
        <rect x="350" y="36" width="8" height="12" />
        <rect x="364" y="12" width="8" height="36" />
        <rect x="378" y="26" width="8" height="22" />
        <rect x="392" y="32" width="8" height="16" />
        <rect x="406" y="18" width="8" height="30" />
        <rect x="420" y="38" width="8" height="10" />
        <rect x="434" y="24" width="8" height="24" />
      </g>
      <!-- range track -->
      <rect x="0" y="55" width="464" height="3" rx="1.5" fill="#232a4d" />
      <rect x="80" y="55" width="280" height="3" rx="1.5" fill="#f5b042" />
      <circle cx="80" cy="56.5" r="6" fill="#f5b042" />
      <circle cx="360" cy="56.5" r="6" fill="#f5b042" />
    </g>

    <!-- event rows -->
    <g transform="translate(18, 180)">
      <!-- error event -->
      <g transform="translate(0,0)">
        <rect width="464" height="40" rx="4" fill="#0b0e1a" />
        <rect x="0" y="0" width="3" height="40" fill="#f05050" />
        <text x="18" y="17" fill="#f05050" font-size="11" font-weight="600" font-family="ui-monospace, monospace">400</text>
        <text x="58" y="17" fill="#e6e8f5" font-size="11" font-weight="600">POST</text>
        <text x="100" y="17" fill="#8590b8" font-size="10.5" font-family="ui-monospace, monospace">/api/SgkReports/GetPendingReport</text>
        <text x="18" y="33" fill="#8590b8" font-size="10">SGK_USER_SETTINGS_NOT_EXIST · 92ms</text>
      </g>
      <g transform="translate(0,46)">
        <rect width="464" height="40" rx="4" fill="#0b0e1a" />
        <rect x="0" y="0" width="3" height="40" fill="#5fdc8a" />
        <text x="18" y="17" fill="#5fdc8a" font-size="11" font-weight="600" font-family="ui-monospace, monospace">200</text>
        <text x="58" y="17" fill="#e6e8f5" font-size="11" font-weight="600">GET</text>
        <text x="100" y="17" fill="#8590b8" font-size="10.5" font-family="ui-monospace, monospace">/api/profile/me</text>
        <text x="18" y="33" fill="#8590b8" font-size="10">ok · 41ms</text>
      </g>
      <g transform="translate(0,92)">
        <rect width="464" height="40" rx="4" fill="#0b0e1a" />
        <rect x="0" y="0" width="3" height="40" fill="#8590b8" />
        <text x="18" y="17" fill="#8590b8" font-size="11" font-weight="600">action.click</text>
        <text x="18" y="33" fill="#8590b8" font-size="10">button.btn-submit · "Onayla"</text>
      </g>
    </g>

    <!-- copy chips -->
    <g transform="translate(18, 326)">
      <rect width="464" height="34" rx="4" fill="#0b0e1a" />
      <text x="14" y="20" fill="#8590b8" font-size="10.5" font-weight="500">Copy:</text>
      <g font-size="10.5" font-weight="500" fill="#e6e8f5">
        <rect x="56" y="8" width="36" height="20" rx="3" fill="#161b34" stroke="#232a4d" />
        <text x="65" y="22">URL</text>
        <rect x="98" y="8" width="60" height="20" rx="3" fill="#161b34" stroke="#232a4d" />
        <text x="106" y="22">Request</text>
        <rect x="164" y="8" width="68" height="20" rx="3" fill="#161b34" stroke="#232a4d" />
        <text x="172" y="22">Response</text>
        <rect x="238" y="8" width="80" height="20" rx="3" fill="#161b34" stroke="#232a4d" />
        <text x="246" y="22">Req + Resp</text>
        <rect x="324" y="8" width="44" height="20" rx="3" fill="#161b34" stroke="#232a4d" />
        <text x="334" y="22">cURL</text>
        <rect x="374" y="8" width="50" height="20" rx="3" fill="#161b34" stroke="#232a4d" />
        <text x="384" y="22">Token</text>
      </g>
    </g>
  </g>
</svg>
