<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">Hindsight</span>
        </div>
        <div class="filters">
          <button class="filter active" data-filter="failed">Failed</button>
          <button class="filter" data-filter="all">All</button>
          <button class="ghost" id="clear">Clear</button>
        </div>
      </header>

      <div id="list" class="list">
        <div class="empty">
          <div class="empty-title">No requests yet</div>
          <div class="empty-sub">
            Reproduce the bug on this tab — requests will appear here.
          </div>
        </div>
      </div>

      <div id="bulk-bar" class="bulk-bar hidden"></div>

      <section id="detail" class="detail hidden"></section>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
