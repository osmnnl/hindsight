<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">Hindsight</span>
        </div>
      </header>

      <main>
        <div id="summary" class="summary">
          <div class="counts">
            <span class="count-total"><strong>0</strong> events</span>
            <span class="count-errors hidden"></span>
          </div>
          <div id="latest-error" class="latest-error hidden"></div>
        </div>

        <div class="actions">
          <button id="open-panel" class="primary">Open side panel</button>
          <button id="quick-report" class="secondary" disabled>Send quick report</button>
        </div>

        <footer class="popup-footer">
          <a id="open-settings" href="#" tabindex="0">Settings</a>
        </footer>
      </main>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
