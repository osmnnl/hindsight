<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">Hindsight</span>
        </div>
      </header>

      <main>
        <div id="summary" class="summary">
          <button
            id="summary-counts"
            class="counts-button"
            type="button"
            data-i18n-attr="aria-label:popup.summary.title.openFiltered"
          >
            <span class="count-total">
              <strong>0</strong>
              <span data-i18n="popup.summary.eventsLabel">events</span>
            </span>
            <span class="count-errors hidden"></span>
          </button>

          <div id="failure-list" class="failure-list hidden" role="list"></div>
        </div>

        <div id="recording-banner" class="recording-banner hidden">
          <span class="recording-dot" aria-hidden="true"></span>
          <span class="recording-label" id="recording-label"
            ><span data-i18n="popup.recording.label">Recording</span> ·
            <span id="recording-time">00:00</span></span
          >
          <button id="recording-stop" class="ghost-stop" data-i18n="popup.recording.stop">
            ■ Stop
          </button>
        </div>

        <div class="actions">
          <button id="open-panel" class="primary" data-i18n="popup.actions.openPanel">
            Open side panel
          </button>
          <button
            id="download-bundle"
            class="secondary"
            disabled
            data-i18n="popup.actions.downloadBundle"
          >
            ⤓ Download replay bundle
          </button>
        </div>

        <div class="page-controls">
          <div class="reload-group">
            <button
              id="reload-page"
              class="secondary"
              type="button"
              data-i18n="popup.page.reload"
              data-i18n-attr="title:popup.page.reload.title"
            >
              ↻ Reload
            </button>
            <button
              id="reload-hard"
              class="secondary"
              type="button"
              data-i18n="popup.page.hardReload"
              data-i18n-attr="title:popup.page.hardReload.title"
            >
              ↻ Hard reload
            </button>
          </div>
          <button
            id="clear-events"
            class="secondary danger-btn"
            type="button"
            data-i18n="popup.page.clearHistory"
            data-i18n-attr="title:popup.page.clearHistory.title"
          >
            🗑 Clear history
          </button>
        </div>

        <div id="quick-share" class="quick-share hidden">
          <div class="quick-share-label" data-i18n="popup.share.label">Send to</div>
          <div class="quick-share-buttons" id="quick-share-buttons"></div>
        </div>

        <footer class="popup-footer">
          <a id="open-settings" href="#" tabindex="0" data-i18n="popup.footer.settings">
            Settings
          </a>
        </footer>
      </main>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
