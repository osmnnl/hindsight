<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">Hindsight</span>
        </div>
      </header>

      <main>
        <div id="summary" class="summary">
          <button
            id="summary-counts"
            class="counts-button"
            type="button"
            aria-label="Open side panel filtered to failures"
          >
            <span class="count-total"><strong>0</strong> events</span>
            <span class="count-errors hidden"></span>
          </button>

          <div id="failure-list" class="failure-list hidden" role="list"></div>
        </div>

        <div id="recording-banner" class="recording-banner hidden">
          <span class="recording-dot" aria-hidden="true"></span>
          <span class="recording-label">Recording · <span id="recording-time">00:00</span></span>
          <button id="recording-stop" class="ghost-stop">■ Stop</button>
        </div>

        <div class="actions">
          <button id="open-panel" class="primary">Open side panel</button>
          <button id="download-bundle" class="secondary" disabled>⤓ Download replay bundle</button>
        </div>

        <div id="quick-share" class="quick-share hidden">
          <div class="quick-share-label">Send to</div>
          <div class="quick-share-buttons" id="quick-share-buttons"></div>
        </div>

        <footer class="popup-footer">
          <a id="open-settings" href="#" tabindex="0">Settings</a>
        </footer>
      </main>
    </div>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
