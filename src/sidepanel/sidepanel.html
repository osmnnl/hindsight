<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">Hindsight</span>
        </div>
        <div class="filters" role="toolbar" aria-label="Capture controls">
          <button
            class="filter active"
            data-filter="failed"
            aria-pressed="true"
            aria-label="Show only failed events"
          >
            Failed
          </button>
          <button
            class="filter"
            data-filter="api"
            aria-pressed="false"
            aria-label="Show only real API calls (hides framework chunks, static assets, prefetches)"
            title="Hide static assets and framework internals — show only API/data fetches"
          >
            API
          </button>
          <button
            class="filter"
            data-filter="all"
            aria-pressed="false"
            aria-label="Show every captured event"
          >
            All
          </button>
          <button
            id="record-toggle"
            class="ghost"
            title="Start a Tier 4 recording (PRD §6.5)"
            aria-label="Toggle recording mode"
          >
            ● Record
          </button>
          <button class="ghost" id="clear" aria-label="Clear captures for this tab">Clear</button>
        </div>
      </header>

      <div id="scrubber" class="scrubber hidden" aria-label="Timeline scrubber">
        <div id="scrubber-bars" class="scrubber-bars" aria-hidden="true"></div>
        <input
          id="scrubber-input"
          type="range"
          min="0"
          max="100"
          step="1"
          value="100"
          aria-label="Jump to time"
        />
        <div class="scrubber-axis" aria-hidden="true">
          <span id="scrubber-start"></span>
          <span id="scrubber-end"></span>
        </div>
      </div>

      <details id="archive-panel" class="archive-panel">
        <summary>
          <span id="archive-count">0 closed sessions</span>
          <a id="archive-clear" href="#" class="archive-clear hidden">Clear archive</a>
        </summary>
        <div id="archive-list" class="archive-list"></div>
      </details>

      <div id="list" class="list">
        <div class="empty">
          <div class="empty-title">No events yet</div>
          <div class="empty-sub">Browse the page — events will appear here.</div>
        </div>
      </div>

      <div id="bulk-bar" class="bulk-bar hidden"></div>

      <section id="detail" class="detail hidden"></section>
    </div>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
