<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <span class="dot"></span>
          <span class="brand-name">Hindsight</span>
        </div>
        <div class="filters">
          <button class="filter active" data-filter="failed">Failed</button>
          <button class="filter" data-filter="all">All</button>
          <button class="ghost" id="clear">Clear</button>
        </div>
      </header>

      <div id="list" class="list">
        <div class="empty">
          <div class="empty-title">No events yet</div>
          <div class="empty-sub">Browse the page — events will appear here.</div>
        </div>
      </div>

      <div id="bulk-bar" class="bulk-bar hidden"></div>

      <section id="detail" class="detail hidden"></section>
    </div>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
