<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hindsight</title>
    <link rel="icon" type="image/png" href="/icons/icon48.png" />
    <link rel="stylesheet" href="./sidepanel.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 128 128" width="18" height="18" aria-hidden="true">
            <path
              d="M 8 64 Q 64 12 120 64 Q 64 116 8 64 Z"
              fill="#f1eee3"
              stroke="#15161a"
              stroke-width="3.5"
              stroke-linejoin="round"
            />
            <circle cx="64" cy="64" r="20" fill="#15161a" />
            <circle cx="64" cy="64" r="9" fill="#e53935" />
          </svg>
          <span class="brand-name">Hindsight</span>
          <span class="tab-host hidden" id="tab-host" aria-live="polite"></span>
        </div>
        <div class="filters" role="toolbar" aria-label="Capture controls">
          <button
            class="filter active"
            data-filter="failed"
            aria-pressed="true"
            data-i18n="sidepanel.filter.failed"
            data-i18n-attr="aria-label:sidepanel.filter.failed.title;title:sidepanel.filter.failed.title"
          >
            Failed
          </button>
          <button
            class="filter"
            data-filter="api"
            aria-pressed="false"
            data-i18n="sidepanel.filter.api"
            data-i18n-attr="aria-label:sidepanel.filter.api.title;title:sidepanel.filter.api.title"
          >
            API
          </button>
          <button
            class="filter"
            data-filter="all"
            aria-pressed="false"
            data-i18n="sidepanel.filter.all"
            data-i18n-attr="aria-label:sidepanel.filter.all.title;title:sidepanel.filter.all.title"
          >
            All
          </button>
          <div class="category-filter">
            <button
              id="category-filter-btn"
              class="ghost"
              type="button"
              aria-haspopup="true"
              aria-expanded="false"
              data-i18n-attr="title:sidepanel.categories.title"
            >
              ⚑
            </button>
            <div id="category-popover" class="category-popover hidden" role="menu">
              <div class="category-popover-title" data-i18n="sidepanel.categories.title">
                Show categories
              </div>
              <label class="cat-check"
                ><input type="checkbox" data-category="network" />
                <span data-i18n="settings.capture.categories.network"
                  >HTTP requests (fetch / XHR)</span
                ></label
              >
              <label class="cat-check"
                ><input type="checkbox" data-category="realtime" />
                <span data-i18n="settings.capture.categories.realtime">WebSocket / SSE</span></label
              >
              <label class="cat-check"
                ><input type="checkbox" data-category="console" />
                <span data-i18n="settings.capture.categories.console"
                  >Console (errors, warnings, info)</span
                ></label
              >
              <label class="cat-check"
                ><input type="checkbox" data-category="navigation" />
                <span data-i18n="settings.capture.categories.navigation">Navigations</span></label
              >
              <label class="cat-check"
                ><input type="checkbox" data-category="action" />
                <span data-i18n="settings.capture.categories.action"
                  >User actions (clicks, input, recording)</span
                ></label
              >
              <label class="cat-check"
                ><input type="checkbox" data-category="performance" />
                <span data-i18n="settings.capture.categories.performance"
                  >Performance (long tasks, layout shifts)</span
                ></label
              >
              <label class="cat-check"
                ><input type="checkbox" data-category="screenshot" />
                <span data-i18n="settings.capture.categories.screenshot">Screenshots</span></label
              >
            </div>
          </div>
          <button
            id="theme-toggle"
            class="ghost theme-toggle"
            type="button"
            data-i18n-attr="aria-label:sidepanel.theme.toggle;title:sidepanel.theme.toggle"
          >
            <svg
              class="ti ti-sun"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"
              />
            </svg>
            <svg
              class="ti ti-moon"
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
            </svg>
          </button>
          <button
            id="pin-toggle"
            class="ghost pin-toggle"
            type="button"
            data-i18n-attr="aria-label:sidepanel.pin.toggle;title:sidepanel.pin.toggle"
          >
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <path d="M9 3h6v2l-1 5 3 3v2H7v-2l3-3-1-5V3z" />
              <line x1="12" y1="15" x2="12" y2="21" />
            </svg>
          </button>
          <button
            id="record-toggle"
            class="ghost"
            data-i18n="sidepanel.record.start"
            data-i18n-attr="aria-label:sidepanel.record.title;title:sidepanel.record.title"
          >
            ● Record
          </button>
          <button
            class="ghost"
            id="clear"
            data-i18n="sidepanel.clear"
            data-i18n-attr="aria-label:sidepanel.clear.title;title:sidepanel.clear.title"
          >
            Clear
          </button>
        </div>
      </header>

      <div id="query-bar" class="query-bar hidden">
        <input
          id="search-input"
          type="search"
          placeholder="Search URLs, messages, payloads…"
          data-i18n-attr="placeholder:sidepanel.search.placeholder;aria-label:sidepanel.search.label"
        />
        <label class="host-picker" data-i18n-attr="title:sidepanel.host.label">
          <span class="host-picker-label" data-i18n="sidepanel.host.label">Host</span>
          <select id="host-select" data-i18n-attr="aria-label:sidepanel.host.label">
            <option value="" data-i18n="common.any">Any</option>
          </select>
          <button
            id="host-clear"
            class="host-clear hidden"
            type="button"
            data-i18n-attr="aria-label:sidepanel.host.clear;title:sidepanel.host.clear"
          >
            ×
          </button>
        </label>
        <span id="result-count" class="result-count" aria-live="polite"></span>
      </div>

      <div
        id="scrubber"
        class="scrubber hidden"
        data-i18n-attr="aria-label:sidepanel.scrubber.label"
      >
        <div id="scrubber-bars" class="scrubber-bars" aria-hidden="true"></div>
        <div class="scrubber-range">
          <div class="scrubber-track" aria-hidden="true">
            <div class="scrubber-track-selected" id="scrubber-track-selected"></div>
          </div>
          <input
            id="scrubber-start-input"
            type="range"
            min="0"
            max="100"
            step="1"
            value="0"
            data-i18n-attr="aria-label:sidepanel.scrubber.startLabel"
          />
          <input
            id="scrubber-end-input"
            type="range"
            min="0"
            max="100"
            step="1"
            value="100"
            data-i18n-attr="aria-label:sidepanel.scrubber.endLabel"
          />
        </div>
        <div class="scrubber-axis" aria-hidden="true">
          <span id="scrubber-start"></span>
          <button
            type="button"
            id="scrubber-reset"
            class="scrubber-reset hidden"
            data-i18n="sidepanel.scrubber.reset"
            data-i18n-attr="aria-label:sidepanel.scrubber.resetTitle;title:sidepanel.scrubber.resetTitle"
          >
            ↺ reset
          </button>
          <span id="scrubber-end"></span>
        </div>
      </div>

      <details id="archive-panel" class="archive-panel">
        <summary>
          <span id="archive-count" data-i18n="sidepanel.archive.empty">0 closed sessions</span>
          <a
            id="archive-clear"
            href="#"
            class="archive-clear hidden"
            data-i18n="sidepanel.archive.clear"
            >Clear archive</a
          >
        </summary>
        <div id="archive-list" class="archive-list"></div>
      </details>

      <div id="list" class="list">
        <div class="empty">
          <svg
            class="empty-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          <div class="empty-title" data-i18n="sidepanel.empty.title">No events yet</div>
          <div class="empty-sub" data-i18n="sidepanel.empty.sub">
            Browse the page — events will appear here.
          </div>
        </div>
      </div>

      <div id="bulk-bar" class="bulk-bar hidden"></div>

      <section id="detail" class="detail hidden"></section>
    </div>
    <script type="module" src="./sidepanel.ts"></script>
  </body>
</html>
